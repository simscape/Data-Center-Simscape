<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">

  <!-- ── Outer block body ───────────────────────────────────────── -->
  <rect x="60" y="40" width="180" height="220" rx="10"
        fill="#EAF6FC" stroke="#7EC8E3" stroke-width="2"/>

  <!-- ── Block name label ───────────────────────────────────────── -->
  <text x="150" y="28" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#444444">Data Centre</text>

  <!-- ── Port stubs LEFT ───────────────────────────────────────── -->
  <!-- + terminal -->
  <line x1="36" y1="110" x2="60" y2="110" stroke="#444444" stroke-width="1.4"/>
  <text x="32" y="110" text-anchor="end" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="10" fill="#444444">+</text>

  <!-- − terminal -->
  <line x1="36" y1="150" x2="60" y2="150" stroke="#444444" stroke-width="1.4"/>
  <text x="32" y="150" text-anchor="end" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="10" fill="#444444">−</text>

  <!-- C terminal -->
  <line x1="36" y1="190" x2="60" y2="190" stroke="#444444" stroke-width="1.4"/>
  <text x="32" y="190" text-anchor="end" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="10" fill="#444444">C</text>

  <!-- ── Port stubs RIGHT ───────────────────────────────────────── -->
  <!-- P terminal -->
  <line x1="240" y1="110" x2="264" y2="110" stroke="#444444" stroke-width="1.4"/>
  <text x="268" y="110" text-anchor="start" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="10" fill="#444444">P</text>

  <!-- Q terminal -->
  <line x1="240" y1="150" x2="264" y2="150" stroke="#444444" stroke-width="1.4"/>
  <text x="268" y="150" text-anchor="start" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="10" fill="#444444">Q</text>

  <!-- n terminal -->
  <line x1="240" y1="190" x2="264" y2="190" stroke="#444444" stroke-width="1.4"/>
  <text x="268" y="190" text-anchor="start" dominant-baseline="central"
        font-family="Arial, sans-serif" font-size="10" fill="#444444">n</text>

  <!-- ── Icon inner white canvas ────────────────────────────────── -->
  <rect x="72" y="52" width="156" height="196" rx="5"
