<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <rect width="900" height="280" fill="#f8f9fa" rx="6"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="130" y="24" text-anchor="middle" font-size="12" font-weight="bold" fill="#777">PHASE 1: INCLUSION</text>
  <text x="570" y="24" text-anchor="middle" font-size="12" font-weight="bold" fill="#777">PHASE 2: EXCLUSION</text>

  <!-- Phase 1: IncludeDirectories -->
  <rect x="25" y="45" width="210" height="80" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">IncludeDirectories</text>
  <text x="130" y="97" text-anchor="middle" font-size="11" fill="#444">Always-recursive directory search</text>
  <text x="130" y="113" text-anchor="middle" font-size="10" fill="#666">(all subfolders included)</text>

  <!-- Phase 1: IncludeFiles -->
  <rect x="25" y="150" width="210" height="80" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="130" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">IncludeFiles</text>
  <text x="130" y="202" text-anchor="middle" font-size="11" fill="#444">Explicit file paths</text>
  <text x="130" y="218" text-anchor="middle" font-size="10" fill="#666">(relative to project root)</text>

  <!-- Merge -->
  <rect x="290" y="80" width="130" height="115" rx="6" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <text x="355" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">Merge</text>
  <text x="355" y="148" text-anchor="middle" font-size="11" fill="#444">+ Deduplicate</text>
  <text x="355" y="168" text-anchor="middle" font-size="10" fill="#666">(unique file list)</text>

  <!-- Arrows to Merge -->
  <line x1="235" y1="85" x2="286" y2="118" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="235" y1="190" x2="286" y2="157" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Exclusion filters -->
  <rect x="475" y="50" width="220" height="175" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="585" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Exclusion Filters</text>
  <line x1="495" y1="90" x2="675" y2="90" stroke="#c62828" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="585" y="115" text-anchor="middle" font-size="12" fill="#444">1. ExcludeFunctionFiles</text>
  <text x="585" y="140" text-anchor="middle" font-size="12" fill="#444">2. ExcludeDirectories</text>
  <text x="585" y="165" text-anchor="middle" font-size="12" fill="#444">3. ExcludeFiles</text>
  <line x1="495" y1="180" x2="675" y2="180" stroke="#c62828" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="585" y="202" text-anchor="middle" font-size="10" fill="#888">(case-sensitive matching)</text>
  <text x="585" y="218" text-anchor="middle" font-size="10" fill="#c62828" font-style="italic">Exclusion always wins</text>

  <!-- Arrow to Exclusion -->
  <line x1="420" y1="137" x2="471" y2="137" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Final list -->
  <rect x="750" y="90" width="120" height="95" rx="6" fill="#e8eaf6" stroke="#283593" stroke-width="1.5"/>
  <text x="810" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Final File List</text>
  <text x="810" y="148" text-anchor="middle" font-size="11" fill="#444">Ready for</text>
  <text x="810" y="166" text-anchor="middle" font-size="11" fill="#444">testing</text>

  <!-- Arrow to Final -->
  <line x1="695" y1="137" x2="746" y2="137" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>
