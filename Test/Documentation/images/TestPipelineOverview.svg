  <rect x="595" y="564" width="410" height="60" rx="5" fill="#f4f7fa" stroke="#8fa8bf" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="800" y="592" text-anchor="middle" font-size="18" font-weight="600" fill="#5c7a99">Utilities</text>
  <text x="800" y="615" text-anchor="middle" font-size="15" fill="#8fa8bf">excludeByDirectory, isFunctionFile, resolveProjectPaths</text>

  <!-- Internal vertical arrows -->
  <line x1="800" y1="180" x2="800" y2="206" stroke="#5c7a99" stroke-width="1.5" marker-end="url(#mw-arrow-int)"/>
  <line x1="800" y1="272" x2="800" y2="294" stroke="#5c7a99" stroke-width="1.5" marker-end="url(#mw-arrow-int)"/>
  <line x1="800" y1="360" x2="800" y2="382" stroke="#5c7a99" stroke-width="1.5" marker-end="url(#mw-arrow-int)"/>
  <line x1="800" y1="448" x2="800" y2="470" stroke="#5c7a99" stroke-width="1.5" marker-end="url(#mw-arrow-int)"/>

  <!-- ================================================================ -->
  <!-- DIVERGING ARROW                                                   -->
  <!-- Output boxes: y=130,290,450  height=110  centers: 185,345,505    -->
  <!-- ================================================================ -->
  <!-- Single merged arrow out of framework box -->
  <line x1="1045" y1="345" x2="1130" y2="345" stroke="#1a3a5c" stroke-width="1.8"/>

  <!-- Vertical distributor line -->
  <line x1="1130" y1="185" x2="1130" y2="505" stroke="#1a3a5c" stroke-width="1.8"/>

  <!-- Horizontal stubs to each output box (aligned to box centers) -->
  <line x1="1130" y1="185" x2="1170" y2="185" stroke="#1a3a5c" stroke-width="1.8" marker-end="url(#mw-arrow)"/>
  <line x1="1130" y1="345" x2="1170" y2="345" stroke="#1a3a5c" stroke-width="1.8" marker-end="url(#mw-arrow)"/>
  <line x1="1130" y1="505" x2="1170" y2="505" stroke="#1a3a5c" stroke-width="1.8" marker-end="url(#mw-arrow)"/>

  <!-- ================================================================ -->
  <!-- COLUMN 3: OUTPUTS                                                 -->
  <!-- Boxes: y=130,290,450  height=110  centers: 185,345,505           -->
  <!-- ================================================================ -->
  <text x="1370" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a3a5c" letter-spacing="1.5">OUTPUTS</text>

  <!-- JUnit XML (center=185) -->
  <rect x="1170" y="130" width="400" height="110" rx="6" fill="#ffffff" stroke="#1a3a5c" stroke-width="2.2"/>
  <rect x="1170" y="130" width="400" height="32" rx="6" fill="#1a3a5c"/>
  <rect x="1170" y="156" width="400" height="6" fill="#1a3a5c"/>
  <text x="1370" y="153" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">JUnit XML</text>
  <text x="1370" y="192" text-anchor="middle" font-size="17" font-weight="600" fill="#333">CI/CD pipeline results</text>
  <text x="1370" y="220" text-anchor="middle" font-size="16" fill="#555">Machine-readable test outcomes</text>

  <!-- HTML Test Report (center=345) -->
  <rect x="1170" y="290" width="400" height="110" rx="6" fill="#ffffff" stroke="#1a3a5c" stroke-width="2.2"/>
  <rect x="1170" y="290" width="400" height="32" rx="6" fill="#1a3a5c"/>
  <rect x="1170" y="316" width="400" height="6" fill="#1a3a5c"/>
  <text x="1370" y="313" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">HTML Test Report</text>
  <text x="1370" y="352" text-anchor="middle" font-size="17" font-weight="600" fill="#333">Interactive test results</text>
  <text x="1370" y="380" text-anchor="middle" font-size="16" fill="#555">Pass/fail per test point with details</text>

  <!-- Code Coverage Report (center=505) -->
  <rect x="1170" y="450" width="400" height="110" rx="6" fill="#ffffff" stroke="#1a3a5c" stroke-width="2.2"/>
  <rect x="1170" y="450" width="400" height="32" rx="6" fill="#1a3a5c"/>
  <rect x="1170" y="476" width="400" height="6" fill="#1a3a5c"/>
  <text x="1370" y="473" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">Code Coverage Report</text>
  <text x="1370" y="512" text-anchor="middle" font-size="17" font-weight="600" fill="#333">Line-by-line coverage</text>
  <text x="1370" y="540" text-anchor="middle" font-size="16" fill="#555">HTML report per source file</text>

  <!-- Report folder -->
  <rect x="1170" y="580" width="400" height="70" rx="6" fill="#f4f7fa" stroke="#8fa8bf" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="1370" y="611" text-anchor="middle" font-size="17" font-weight="600" fill="#5c7a99">ProjectTestReport</text>
  <text x="1370" y="637" text-anchor="middle" font-size="15" fill="#8fa8bf">One output folder per test subset</text>

  <!-- ================================================================ -->
  <!-- CI/CD Banner                                                      -->
  <!-- ================================================================ -->
  <rect x="30" y="730" width="1540" height="64" rx="6" fill="#f4f7fa" stroke="#1a3a5c" stroke-width="1.8"/>
  <text x="800" y="759" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a3a5c">CI/CD Integration</text>
  <text x="800" y="783" text-anchor="middle" font-size="17" fill="#555">buildfile.m  |  CI system</text>
</svg>
