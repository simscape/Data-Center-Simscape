<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- Definitions -->
  <defs>
    <marker id="mw-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a3a5c"/>
    </marker>
    <marker id="mw-arrow-int" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#5c7a99"/>
    </marker>
  </defs>

  <!-- Full background -->
  <rect width="1600" height="820" fill="#ffffff" rx="6"/>

  <!-- ================================================================ -->
  <!-- COLUMN 1: INPUTS                                                  -->
  <!-- Boxes: y=90,220,350,480  height=110  centers: 145,275,405,535    -->
  <!-- ================================================================ -->
  <text x="230" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a3a5c" letter-spacing="1.5">INPUTS</text>

  <!-- Simulink Models -->
  <rect x="30" y="90" width="400" height="110" rx="6" fill="#ffffff" stroke="#0076a8" stroke-width="2.2"/>
  <rect x="30" y="90" width="400" height="32" rx="6" fill="#0076a8"/>
  <rect x="30" y="116" width="400" height="6" fill="#0076a8"/>
  <text x="230" y="113" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">Simulink Models</text>
  <text x="230" y="152" text-anchor="middle" font-size="17" font-weight="600" fill="#333">config.Models.IncludeDirectories</text>
  <text x="230" y="180" text-anchor="middle" font-size="16" fill="#555">.slx, .mdl files</text>

  <!-- Workflow Scripts -->
  <rect x="30" y="220" width="400" height="110" rx="6" fill="#ffffff" stroke="#77ac30" stroke-width="2.2"/>
  <rect x="30" y="220" width="400" height="32" rx="6" fill="#77ac30"/>
  <rect x="30" y="246" width="400" height="6" fill="#77ac30"/>
  <text x="230" y="243" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">Workflow Scripts</text>
  <text x="230" y="282" text-anchor="middle" font-size="17" font-weight="600" fill="#333">config.Workflows.IncludeDirectories</text>
  <text x="230" y="310" text-anchor="middle" font-size="16" fill="#555">.m, .mlx scripts (functions excluded)</text>

  <!-- Custom Tests -->
  <rect x="30" y="350" width="400" height="110" rx="6" fill="#ffffff" stroke="#d95319" stroke-width="2.2"/>
  <rect x="30" y="350" width="400" height="32" rx="6" fill="#d95319"/>
  <rect x="30" y="376" width="400" height="6" fill="#d95319"/>
  <text x="230" y="373" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">Custom Tests</text>
  <text x="230" y="412" text-anchor="middle" font-size="17" font-weight="600" fill="#333">config.CustomTests.Files / Directories</text>
  <text x="230" y="440" text-anchor="middle" font-size="16" fill="#555">matlab.unittest.TestCase classes</text>

  <!-- Source Code (Coverage) -->
  <rect x="30" y="480" width="400" height="110" rx="6" fill="#ffffff" stroke="#7e2f8e" stroke-width="2.2"/>
  <rect x="30" y="480" width="400" height="32" rx="6" fill="#7e2f8e"/>
  <rect x="30" y="506" width="400" height="6" fill="#7e2f8e"/>
  <text x="230" y="503" text-anchor="middle" font-size="19" font-weight="bold" fill="#ffffff">Source Code (Coverage)</text>
  <text x="230" y="542" text-anchor="middle" font-size="17" font-weight="600" fill="#333">config.CodeCoverage.IncludeDirectories</text>
  <text x="230" y="570" text-anchor="middle" font-size="16" fill="#555">Production .m/.mlx (excl. Test/)</text>

  <!-- ================================================================ -->
  <!-- CONVERGING ARROW                                                  -->
  <!-- Stubs from box centers: y=145, 275, 405, 535                     -->
  <!-- ================================================================ -->
  <line x1="430" y1="145" x2="470" y2="145" stroke="#1a3a5c" stroke-width="1.8"/>
  <line x1="430" y1="275" x2="470" y2="275" stroke="#1a3a5c" stroke-width="1.8"/>
  <line x1="430" y1="405" x2="470" y2="405" stroke="#1a3a5c" stroke-width="1.8"/>
  <line x1="430" y1="535" x2="470" y2="535" stroke="#1a3a5c" stroke-width="1.8"/>

