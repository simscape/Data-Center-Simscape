  <!-- COLUMN 2: TEST FRAMEWORK BOX                                      -->
  <!-- Label ABOVE the box                                              -->
  <!-- ================================================================ -->
  <text x="800" y="55" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a3a5c" letter-spacing="1.5">TEST FRAMEWORK</text>
  <rect x="555" y="78" width="490" height="620" rx="8" fill="#f4f7fa" stroke="#1a3a5c" stroke-width="3"/>

  <!-- testConfig.m -->
  <rect x="580" y="100" width="440" height="80" rx="6" fill="#fff8e1" stroke="#b8860b" stroke-width="2"/>
  <text x="800" y="137" text-anchor="middle" font-size="22" font-weight="bold" fill="#7a5a00">testConfig.m</text>
  <text x="800" y="166" text-anchor="middle" font-size="17" font-weight="600" fill="#555">Two-phase discovery: Include → Exclude</text>

  <!-- TestFileDiscovery -->
  <rect x="595" y="212" width="410" height="60" rx="5" fill="#ffffff" stroke="#5c7a99" stroke-width="1.6"/>
  <text x="800" y="249" text-anchor="middle" font-size="20" font-weight="600" fill="#1a3a5c">TestFileDiscovery.m</text>

  <!-- TestExecutor -->
  <rect x="595" y="300" width="410" height="60" rx="5" fill="#ffffff" stroke="#5c7a99" stroke-width="1.6"/>
  <text x="800" y="337" text-anchor="middle" font-size="20" font-weight="600" fill="#1a3a5c">TestExecutor.m</text>

  <!-- ProjectSmokeTests -->
  <rect x="595" y="388" width="410" height="60" rx="5" fill="#ffffff" stroke="#5c7a99" stroke-width="1.6"/>
  <text x="800" y="425" text-anchor="middle" font-size="20" font-weight="600" fill="#1a3a5c">ProjectSmokeTests.m</text>

  <!-- TestReportBuilder -->
  <rect x="595" y="476" width="410" height="60" rx="5" fill="#ffffff" stroke="#5c7a99" stroke-width="1.6"/>
  <text x="800" y="513" text-anchor="middle" font-size="20" font-weight="600" fill="#1a3a5c">TestReportBuilder.m</text>

